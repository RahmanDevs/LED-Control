<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Distance Measurement — Arduino</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@300;600;900&display=swap" rel="stylesheet">
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/distance.css') }}">
</head>
<body>

  <div class="header">
    <p class="label">HC-SR04 &mdash; COM6 @ 9600 baud</p>
    <h1>Distance <span>Measurement</span></h1>
  </div>

  <div class="card" id="card">

    <!-- WebSocket status -->
    <div class="status-row">
      <div class="dot" id="ws-dot"></div>
      <span id="ws-label">Connecting&hellip;</span>
    </div>

    <!-- Arduino serial status -->
    <div class="status-row">
      <div class="dot" id="ard-dot"></div>
      <span id="ard-label">Arduino&hellip;</span>
    </div>

    <!-- Main readout -->
    <div class="readout" id="readout">
      <span class="readout-value" id="dist-value">—</span>
      <button class="unit-toggle" id="unit-toggle" onclick="toggleUnit()" title="Switch unit">cm</button>
    </div>

    <!-- Range bar -->
    <div class="range-wrap">
      <span class="range-label">0</span>
      <div class="range-track">
        <div class="range-fill" id="range-fill"></div>
        <div class="range-marker" id="range-marker"></div>
      </div>
      <span class="range-label">400 cm</span>
    </div>

    <!-- Stats row -->
    <div class="stats-row">
      <div class="stat-box">
        <span class="stat-label">Min</span>
        <span class="stat-value" id="stat-min">—</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Max</span>
        <span class="stat-value" id="stat-max">—</span>
      </div>
      <div class="stat-box">
        <span class="stat-label">Readings</span>
        <span class="stat-value" id="stat-count">0</span>
      </div>
    </div>

  </div>

  <!-- Connected clients -->
  <div class="panel">
    <div class="panel-header">
      <span>&#x25B8; Connected Clients</span>
      <span class="badge" id="client-count">0</span>
    </div>
    <div class="clients-body" id="clients-body">
      <span class="no-clients">No clients connected</span>
    </div>
  </div>

  <!-- Reading log -->
  <div class="panel">
    <div class="panel-header">
      <span>&#x25B8; Reading Log</span>
      <button class="clear-btn" onclick="clearLog()">Clear</button>
    </div>
    <div class="console-body" id="console-body"></div>
  </div>

  <div class="meta">
    <span>Arduino Mega 2560</span>
    <span>Pin 9 (TRIG) &mdash; Pin 10 (ECHO)</span>
    <span>Flask-SocketIO</span>
  </div>

  <script src="{{ url_for('static', filename='js/distance.js') }}"></script>

</body>
</html>
